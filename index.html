<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santushti Garments</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    color:black;
}

/* HEADER */

header{
    background:linear-gradient(90deg,#000,#222);

    color:white;

    text-align:center;

    padding:30px;

    font-size:40px;

    font-weight:bold;

    letter-spacing:2px;

    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* CONTAINER */

.container{
    padding:20px;
}

/* PRODUCT CARD */

.card{

    background:#111;

    border-radius:25px;

    overflow:hidden;

    margin-bottom:50px;

    box-shadow:
    0 0 25px rgba(0,0,0,0.3);

    animation:fade 1.2s;
}

/* IMAGE */

.card img{
    width:100%;
    display:block;
}

/* DETAILS */

.details{
    padding:25px;
    color:white;
}

/* TITLE */

.details h2{
    font-size:38px;
    margin-bottom:15px;
}

/* DESCRIPTION */

.details p{
    font-size:21px;
    color:#ddd;
    line-height:1.5;
}

/* PRICE */

.price{
    font-size:42px;
    color:gold;
    font-weight:bold;
    margin:25px 0;
}

/* BUTTON */

button{

    width:100%;

    padding:18px;

    border:none;

    background:#25D366;

    color:white;

    font-size:24px;

    border-radius:15px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    animation:glow 1.5s infinite alternate;
}

/* BUTTON HOVER */

button:hover{
    transform:scale(1.04);
}

/* GLOW EFFECT */

@keyframes glow{

    from{
        box-shadow:0 0 10px #25D366;
    }

    to{
        box-shadow:
        0 0 25px #25D366,
        0 0 45px #25D366;
    }
}

/* CARD ANIMATION */

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* LINE */

hr{
    border:none;
    height:4px;
    background:black;
    margin:45px 0;
    border-radius:10px;
}

/* FOOTER */

footer{
    text-align:center;
    background:black;
    color:white;
    padding:30px;
    font-size:22px;
    margin-top:30px;
}

</style>

</head>

<body>

<header>
Santushti Garments
</header>

<div class="container">

<!-- PRODUCT 1 -->

<div class="card">

<img src="https://i.ibb.co/9kTfTd5t/IMG-20260516-WA0002.jpg" alt="Tshirt">

<div class="details">

<h2>Luxury White Printed T-Shirt</h2>

<p>
Premium stylish white printed t-shirt for daily fashion and modern look.
</p>

<div class="price">
₹299
</div>

<a target="_blank"
href="https://wa.me/919235632436?text=Hello%20I%20want%20to%20order%20Luxury%20White%20Printed%20T-Shirt">

<button>
Order on WhatsApp
</button>

</a>

</div>
</div>

<hr>

<!-- PRODUCT 2 -->

<div class="card">

<img src="https://i.ibb.co/kVwqPxCY/IMG-20260516-WA0000.jpg" alt="Tshirt">

<div class="details">

<h2>Premium Fashion Casual T-Shirt</h2>

<p>
Luxury premium fashion t-shirt with stylish design and comfortable fitting.
</p>

<div class="price">
₹499
</div>

<a target="_blank"
href="https://wa.me/919235632436?text=Hello%20I%20want%20to%20order%20Premium%20Fashion%20Casual%20T-Shirt">

<button>
Order on WhatsApp
</button>

</a>

</div>
</div>

</div>

<footer>
© 2026 Santushti Garments
</footer>

</body>
</html>
